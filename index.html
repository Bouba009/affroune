<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Affroun Online</title>
    
    <!-- الملحقات الأساسية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f26522; 
            --secondary: #2c3e50;
            --bg: #f4f6f9;
            --white: #ffffff;
            --shadow: 0 4px 10px rgba(0,0,0,0.08);
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: #333; padding-bottom: 70px; }

        /* Loader */
        #app-loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        header { background: var(--white); height: 60px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--secondary); }
        .logo span { color: var(--primary); }
        .nav-icons { display: flex; gap: 15px; font-size: 1.3rem; color: var(--secondary); }

        .swiper { width: 100%; height: 200px; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .cats-scroll { overflow-x: auto; padding: 15px; white-space: nowrap; background: white; margin-bottom: 10px; }
        .cat-card { display: inline-block; text-align: center; margin-left: 15px; width: 70px; cursor: pointer; }
        .cat-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; }
        .cat-card span { font-size: 0.75rem; font-weight: 700; display: block; margin-top: 5px; }

        .ads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        .ad-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); position: relative; }
        .ad-img { height: 150px; background: #eee; width: 100%; object-fit: cover; }
        .ad-info { padding: 10px; }
        .ad-price { color: var(--primary); font-weight: 800; font-size: 1rem; }
        .ad-title { font-size: 0.85rem; height: 35px; overflow: hidden; margin: 5px 0; font-weight: 600; }

        .fab { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(242,101,34,0.4); z-index: 900; border: none; cursor: pointer; }

        .full-page { position: fixed; inset: 0; background: white; z-index: 1500; display: none; overflow-y: auto; flex-direction: column; }
        .full-page.active { display: flex; }
        .page-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }

        .form-input, .form-select, .form-area { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; font-size: 1rem; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; }

        #admin-panel { background: #f8f9fa; z-index: 2000; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app-loader"><div class="spinner"></div></div>

<header>
    <div class="logo">El Affroun <span>Online</span></div>
    <div class="nav-icons">
        <i class="fas fa-search" onclick="Swal.fire('قريباً', 'ميزة البحث تحت التطوير', 'info')"></i>
        <i class="fas fa-user-circle" id="user-icon" onclick="handleAuth()"></i>
    </div>
</header>

<main>
    <div class="swiper mainSwiper">
        <div class="swiper-wrapper" id="banner-wrapper">
            <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=800&q=80"></div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="cats-scroll" id="cats-list"></div>
    <div class="ads-grid" id="ads-list"></div>
</main>

<button class="fab" onclick="openPublish()"><i class="fas fa-plus"></i></button>

<!-- صفحة الإعلان التفصيلية -->
<div class="full-page" id="details-page">
    <div class="page-header">
        <i class="fas fa-arrow-right" onclick="closePage('details-page')"></i>
        <h3 id="det-header-title">التفاصيل</h3>
    </div>
    <div id="det-content"></div>
</div>

<!-- صفحة النشر -->
<div class="full-page" id="pub-page">
    <div class="page-header">
        <i class="fas fa-times" onclick="closePage('pub-page')"></i>
        <h3>نشر إعلان جديد</h3>
    </div>
    <form id="pub-form" style="padding: 20px;">
        <input type="text" id="p-title" class="form-input" placeholder="عنوان الإعلان" required>
        <select id="p-cat" class="form-select"></select>
        <input type="number" id="p-price" class="form-input" placeholder="السعر (دج)" required>
        <textarea id="p-desc" class="form-area" placeholder="اكتب وصف المنتج هنا..." rows="4"></textarea>
        <p style="font-weight: bold; margin-bottom: 10px;">صور المنتج (حتى 5 صور):</p>
        <input type="file" class="form-input" accept="image/*" id="img1">
        <input type="file" class="form-input" accept="image/*" id="img2">
        <input type="file" class="form-input" accept="image/*" id="img3">
        <button type="submit" class="btn-main" id="pub-btn">نشر الآن</button>
    </form>
</div>

<!-- لوحة التحكم السريّة -->
<div class="full-page" id="admin-panel">
    <div class="page-header" style="background: var(--secondary); color: white;">
        <h3>لوحة التحكم 🛡️</h3>
        <i class="fas fa-times" onclick="closePage('admin-panel')"></i>
    </div>
    <div style="padding: 20px;">
        <div id="admin-stats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
                <h4 id="stat-ads">0</h4>
                <p>إعلان</p>
            </div>
            <div style="background: white; padding: 20px; border-radius: 10px; text-align: center;">
                <h4 id="stat-users">0</h4>
                <p>مستخدم</p>
            </div>
        </div>
        <h3 style="margin-top: 20px;">الإعلانات الحالية:</h3>
        <div id="admin-ads-list"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // إعدادات Firebase الخاصة بك
    const firebaseConfig = {
      apiKey: "AIzaSyDXdDA6rH50zAv5pmZKRkXnqosoFnC3GjY",
      authDomain: "filahadz-31183.firebaseapp.com",
      projectId: "filahadz-31183",
      storageBucket: "filahadz-31183.firebasestorage.app",
      messagingSenderId: "703541527613",
      appId: "1:703541527613:web:7d3af803ba09c894d4d654"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    const categories = ["مركبات", "هواتف", "عقارات", "ملابس", "خدمات", "أخرى"];

    // --- وظائف الأمان (SHA-256) ---
    async function hashPassword(string) {
        const utf8 = new Uint8Array(Array.from(string).map(c => c.charCodeAt(0)));
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    window.checkAdminLink = async () => {
        if (window.location.hash === "#admino09") {
            const { value: password } = await Swal.fire({
                title: 'دخول الإدارة',
                input: 'password',
                inputLabel: 'كلمة المرور السريّة',
                showCancelButton: true
            });

            if (password) {
                const hashed = await hashPassword(password);
                // Hash الخاص بكلمة abobob123
                if (hashed === "483984d72004245f86915354929315053426e25f8224578e367098e946271965") {
                    document.getElementById('admin-panel').classList.add('active');
                    loadAdminData();
                    history.replaceState(null, null, ' '); 
                } else {
                    Swal.fire('خطأ', 'كلمة المرور غير صحيحة', 'error');
                    window.location.hash = "";
                }
            }
        }
    };

    // --- منطق التطبيق الأساسي ---
    window.onload = () => {
        checkAdminLink();
        renderCategories();
        loadAds();
        document.getElementById('app-loader').classList.add('hidden');
        new Swiper(".mainSwiper", { pagination: { el: ".swiper-pagination" }, autoplay: true });
    };

    window.addEventListener('hashchange', checkAdminLink);

    function renderCategories() {
        const catBox = document.getElementById('cats-list');
        catBox.innerHTML = categories.map(c => `
            <div class="cat-card">
                <img src="https://via.placeholder.com/60" alt="${c}">
                <span>${c}</span>
            </div>
        `).join('');
        
        const catSelect = document.getElementById('p-cat');
        catSelect.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    async function loadAds() {
        const adsBox = document.getElementById('ads-list');
        const q = query(collection(db, "ads"), orderBy("time", "desc"));
        const snap = await getDocs(q);
        adsBox.innerHTML = "";
        snap.forEach(doc => {
            const ad = doc.data();
            adsBox.innerHTML += `
                <div class="ad-card" onclick="showDetails('${doc.id}')">
                    <img src="${ad.images?.[0] || 'https://via.placeholder.com/150'}" class="ad-img">
                    <div class="ad-info">
                        <div class="ad-price">${ad.price} دج</div>
                        <div class="ad-title">${ad.title}</div>
                    </div>
                </div>
            `;
        });
    }

    window.openPublish = () => {
        document.getElementById('pub-page').classList.add('active');
    };

    window.closePage = (id) => {
        document.getElementById(id).classList.remove('active');
    };

    // رفع الصور وتحويلها لـ Base64 لسهولة العرض
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    document.getElementById('pub-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('pub-btn');
        btn.innerText = "جاري النشر..."; btn.disabled = true;

        try {
            const imgs = [];
            const files = [document.getElementById('img1').files[0], document.getElementById('img2').files[0], document.getElementById('img3').files[0]];
            for (let f of files) { if(f) imgs.push(await toBase64(f)); }

            await addDoc(collection(db, "ads"), {
                title: document.getElementById('p-title').value,
                price: document.getElementById('p-price').value,
                cat: document.getElementById('p-cat').value,
                desc: document.getElementById('p-desc').value,
                images: imgs,
                time: Date.now()
            });

            Swal.fire('تم!', 'تم نشر إعلانك بنجاح', 'success');
            closePage('pub-page');
            loadAds();
        } catch (err) {
            Swal.fire('خطأ', 'حدثت مشكلة أثناء النشر', 'error');
        } finally {
            btn.innerText = "نشر الآن"; btn.disabled = false;
        }
    };

    // لوحة التحكم
    async function loadAdminData() {
        const snap = await getDocs(collection(db, "ads"));
        document.getElementById('stat-ads').innerText = snap.size;
        const adminList = document.getElementById('admin-ads-list');
        adminList.innerHTML = "";
        snap.forEach(d => {
            const ad = d.data();
            adminList.innerHTML += `
                <div style="background:white; margin-bottom:10px; padding:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center;">
                    <span>${ad.title}</span>
                    <button onclick="deleteAd('${d.id}')" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">حذف</button>
                </div>
            `;
        });
    }

    window.deleteAd = async (id) => {
        if (confirm('هل أنت متأكد من حذف هذا الإعلان؟')) {
            await deleteDoc(doc(db, "ads", id));
            loadAdminData();
            loadAds();
        }
    };

</script>

</body>
</html>
