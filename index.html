<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Affroun Online</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #f26522; 
            --secondary: #2c3e50;
            --bg: #f4f6f9;
            --white: #ffffff;
            --gold: #ffc107;
            --chat-sent: #dcf8c6;
            --chat-recv: #ffffff;
            --radius: 10px;
            --shadow: 0 4px 10px rgba(0,0,0,0.08);
            --transition: all 0.3s ease;
        }

        html[dir="ltr"] { font-family: 'Roboto', sans-serif; }
        html[dir="ltr"] .sidebar { right: auto; left: -280px; }
        html[dir="ltr"] .sidebar.active { left: 0; }
        html[dir="ltr"] .fab-zone { left: auto; right: 20px; }
        html[dir="ltr"] .cat-card { margin-left: 0; margin-right: 15px; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: #333; padding-bottom: 90px; overflow-x: hidden; }

        /* Loader */
        #app-loader { position: fixed; inset: 0; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; transition: opacity 0.5s; }
        .spinner { width: 50px; height: 50px; border: 5px solid #eee; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .flex { display: flex; align-items: center; }
        .center { display: flex; justify-content: center; align-items: center; }
        .btn { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: 700; transition: var(--transition); display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .w-100 { width: 100%; }
        
        /* Fix SweetAlert Z-Index */
        .swal2-container { z-index: 10000 !important; }

        header { background: var(--white); height: 60px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.3rem; font-weight: 800; color: var(--secondary); }
        .logo span { color: var(--primary); }
        .nav-icons { display: flex; gap: 15px; align-items: center; }
        .nav-icon { font-size: 1.4rem; color: var(--secondary); cursor: pointer; position: relative; }
        .badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 50%; display: none; }
        .badge.show { display: block; }
        .lang-switch { font-size: 0.8rem; font-weight: bold; border: 1px solid #ddd; padding: 4px 8px; border-radius: 4px; cursor: pointer; }

        .sidebar { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: white; z-index: 1200; transition: var(--transition); box-shadow: 0 0 15px rgba(0,0,0,0.2); display: flex; flex-direction: column; padding: 20px; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1100; display: none; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        
        /* Banner Slider - FIXED: Force LTR to prevent bugs */
        .swiper { 
            width: 100%; 
            height: 200px; 
            margin-bottom: 15px; 
            border-radius: 0 0 15px 15px;
            direction: ltr !important; /* Key fix */
        }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        .cats-scroll { overflow-x: auto; padding: 10px 15px; white-space: nowrap; scrollbar-width: none; background: white; margin-bottom: 15px; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        .cat-card { display: inline-flex; flex-direction: column; align-items: center; margin-left: 15px; width: 80px; cursor: pointer; }
        .cat-img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; margin-bottom: 5px; transition: var(--transition); }
        .cat-card:hover .cat-img { border-color: var(--primary); transform: scale(1.05); }
        .cat-name { font-size: 0.7rem; font-weight: 700; color: var(--secondary); text-align: center; white-space: normal; line-height: 1.2; }

        .section-title { padding: 0 15px; margin: 20px 0 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 1.1rem; }
        .ads-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 0 10px; max-width: 1200px; margin: 0 auto; }
        
        .ad-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); position: relative; cursor: pointer; transition: transform 0.2s; }
        .ad-card:active { transform: scale(0.98); }
        .ad-card.featured { border: 2px solid var(--gold); }
        .feat-badge { position: absolute; top: 8px; right: 8px; background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; z-index: 2; }
        /* Report Icon on Ad Card */
        .report-badge { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.8); color: red; padding: 5px; border-radius: 50%; font-size: 0.9rem; z-index: 3; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .report-badge:hover { background: red; color: white; }

        .ad-img-box { height: 220px; background: #eee; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .ad-img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .ad-content { padding: 10px; }
        .ad-price { color: var(--primary); font-weight: 800; font-size: 1.1rem; }
        .ad-title { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 5px 0; }
        .ad-meta { font-size: 0.7rem; color: #888; display: flex; justify-content: space-between; }

        /* HTML Ads Container */
        .custom-ads-box { padding: 10px; margin: 10px 0; text-align: center; overflow: hidden; }

        .fab-zone { position: fixed; bottom: 25px; left: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 900; }
        .fab { width: 55px; height: 55px; border-radius: 50%; border: none; color: white; font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; opacity: 0.6; transition: 0.3s; }
        .fab:hover, .fab:active { opacity: 1; transform: scale(1.1); }
        .fab-main { background: var(--primary); font-size: 1.5rem; }
        .fab-sec { background: var(--secondary); }

        .modal-wrap { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-wrap.active { display: flex; }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 12px; padding: 20px; max-height: 85vh; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 1.5rem; cursor: pointer; color: #999; }
        html[dir="ltr"] .close-modal { left: auto; right: 15px; }
        @keyframes slideUp { from {transform: translateY(20px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }

        .form-input, .form-select, .form-area { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; margin-bottom: 10px; }
        .file-input { width: 100%; padding: 10px; background: #f9f9f9; border: 1px dashed #ccc; border-radius: 6px; margin-bottom: 10px; }

        .full-page { position: fixed; inset: 0; background: white; z-index: 1500; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
        .full-page.active { transform: translateY(0); }
        
        .page-header { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; background: white; z-index: 10; }
        .page-back { font-size: 1.2rem; cursor: pointer; }
        
        .chat-list-item { padding: 15px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .chat-list-item.unread { background: #eef7ff; font-weight: bold; border-right: 4px solid var(--primary); }

        .chat-room { flex: 1; background: #e5ddd5; display: flex; flex-direction: column; }
        .msgs-container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 0.9rem; position: relative; word-wrap: break-word; }
        .msg-sent { align-self: flex-end; background: var(--chat-sent); border-bottom-left-radius: 0; }
        .msg-recv { align-self: flex-start; background: var(--chat-recv); border-bottom-right-radius: 0; }
        .chat-input { padding: 10px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }

        #admin-panel { z-index: 5000; background: #f4f6f9; }
        .admin-header { background: var(--secondary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .admin-tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: white; }
        .tab-btn { padding: 6px 15px; background: #eee; border-radius: 20px; white-space: nowrap; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { background: var(--secondary); color: white; }
        .admin-view { padding: 15px; display: none; }
        .admin-view.active { display: block; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: var(--shadow); margin-bottom: 10px; }
        .admin-item { background: white; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }

        .banner-list-item { display: flex; align-items: center; justify-content: space-between; border: 1px solid #eee; padding: 5px; margin-bottom: 5px; border-radius: 5px; }
        .banner-list-item img { height: 40px; width: 60px; object-fit: cover; }

        footer { text-align: center; padding: 30px; color: #999; margin-top: 20px; font-size: 0.8rem; }
        
        .swiper-button-next, .swiper-button-prev { color: var(--primary); text-shadow: 0 0 5px rgba(255,255,255,0.8); }
        
        /* Product View Slider 55% Height & Contain Object Fit - FIXED DIRECTION */
        .swiper.prodSwiper { 
            width: 100%;
            height: 55vh !important;
            min-height: 400px;
            background: #000;
            margin: 0;
            direction: ltr !important; /* Force LTR for images */
        }
        .swiper-slide img.prod-view-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
    </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="app-loader">
    <div class="spinner"></div>
    <h3 style="margin-top:20px;color:#555">El Affroun Online</h3>
</div>

<!-- HEADER -->
<header>
    <div class="flex">
        <i class="fas fa-bars nav-icon" onclick="toggleSidebar()"></i>
        <div class="logo" id="app-logo">El Affroun <span>Online</span></div>
    </div>
    <div class="nav-icons">
        <div class="lang-switch" onclick="toggleLang()" id="lang-txt">FR</div>
        <i class="fas fa-search nav-icon" onclick="openModal('filter-modal')"></i>
        <i class="fas fa-envelope nav-icon" onclick="openMyChats()">
            <span class="badge" id="msg-badge">0</span>
        </i>
        <i class="fas fa-user-circle nav-icon" onclick="checkAuth()"></i>
    </div>
</header>

<!-- SIDEBAR -->
<div class="overlay" onclick="closeAll()"></div>
<div class="sidebar" id="sidebar">
    <div class="flex" style="justify-content:space-between; margin-bottom:20px; border-bottom:1px solid #eee; padding-bottom:10px">
        <h3 class="logo" data-tr="menu">القائمة</h3>
        <i class="fas fa-times" style="font-size:1.5rem; cursor:pointer" onclick="toggleSidebar()"></i>
    </div>
    <div class="menu-item" onclick="window.location.reload()"><i class="fas fa-home"></i> <span data-tr="home">الرئيسية</span></div>
    <div class="menu-item" onclick="openMyChats()"><i class="fas fa-comments"></i> <span data-tr="msgs">الرسائل</span></div>
    <div class="menu-item" onclick="showStatic('about')"><i class="fas fa-info-circle"></i> <span data-tr="about">من نحن</span></div>
    <div class="menu-item" onclick="showStatic('contact')"><i class="fas fa-phone"></i> <span data-tr="contact">اتصل بنا</span></div>
    <div class="menu-item" onclick="showStatic('privacy')"><i class="fas fa-shield-alt"></i> <span data-tr="privacy">سياسة الخصوصية</span></div>
    <div class="menu-item" onclick="openModal('report-modal')"><i class="fas fa-bug"></i> <span data-tr="report">إبلاغ</span></div>
    <div class="menu-item hidden" id="logout-btn" onclick="logout()" style="color:var(--primary); margin-top:auto"><i class="fas fa-sign-out-alt"></i> <span data-tr="logout">خروج</span></div>
</div>

<!-- MAIN -->
<main>
    <!-- Slider -->
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="main-banner-wrapper">
            <!-- Slides injected via JS -->
            <div class="swiper-slide">
                <img src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=800&q=80">
            </div>
        </div>
        <div class="swiper-pagination"></div>
    </div>
    
    <!-- Custom HTML Ads: TOP -->
    <div id="ads-top-container" class="custom-ads-box"></div>

    <!-- Categories -->
    <div class="cats-scroll" id="cats-container"></div>
    
    <!-- Custom HTML Ads: MIDDLE -->
    <div id="ads-middle-container" class="custom-ads-box"></div>

    <!-- Featured -->
    <div id="feat-section" class="hidden">
        <div class="section-title"><span style="color:var(--gold)" data-tr="featured">⭐ مميزة</span></div>
        <div class="ads-grid" id="featured-ads"></div>
    </div>

    <!-- All Ads -->
    <div class="section-title">
        <span data-tr="latest">📦 أحدث الإعلانات</span>
        <small style="color:var(--primary); cursor:pointer" onclick="openModal('filter-modal')"><i class="fas fa-filter"></i></small>
    </div>
    <div class="ads-grid" id="all-ads"></div>
    
    <!-- Custom HTML Ads: BOTTOM -->
    <div id="ads-bottom-container" class="custom-ads-box"></div>
</main>

<!-- FLOATING BUTTONS -->
<div class="fab-zone">
    <button class="fab fab-sec center" onclick="openModal('filter-modal')"><i class="fas fa-sliders-h"></i></button>
    <button class="fab fab-main center" onclick="startPublish()"><i class="fas fa-plus"></i></button>
</div>

<!-- === MODALS === -->

<!-- Login -->
<div class="modal-wrap" id="auth-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('auth-modal')">&times;</span>
        <h2 style="text-align:center; margin-bottom:15px" data-tr="login">دخول</h2>
        <form id="auth-form">
            <input type="email" id="log-email" class="form-input" data-ph="ph_email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="log-pass" class="form-input" data-ph="ph_pass" placeholder="كلمة المرور" required>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-name" class="form-input" data-ph="ph_name" placeholder="الاسم">
                <input type="tel" id="reg-phone" class="form-input" data-ph="ph_phone" placeholder="الهاتف">
            </div>
            <button type="submit" class="btn btn-primary w-100" data-tr="submit">دخول</button>
            <p style="text-align:center; margin-top:15px; color:var(--primary); cursor:pointer" onclick="toggleReg()">حساب جديد / دخول</p>
        </form>
    </div>
</div>

<!-- Publish Ad -->
<div class="modal-wrap" id="pub-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('pub-modal')">&times;</span>
        <h3 style="margin-bottom:15px" data-tr="pub_title" id="pub-modal-title">نشر إعلان</h3>
        <form id="pub-form">
            <input type="text" id="p-title" class="form-input" data-ph="ph_title" placeholder="العنوان" required>
            <select id="p-cat" class="form-select" required></select>
            <div class="flex" style="gap:10px; margin-bottom:10px">
                <input type="number" id="p-price" class="form-input" data-ph="ph_price" placeholder="السعر (DA)" required>
                <select id="p-city" class="form-select" required></select>
            </div>
            <input type="tel" id="p-phone" class="form-input" data-ph="ph_phone" placeholder="رقم الهاتف" required>
            <textarea id="p-desc" class="form-area" rows="3" data-ph="ph_desc" placeholder="الوصف..."></textarea>
            
            <label style="font-weight:bold; font-size:0.9rem" data-tr="img_upload">صور المنتج (الحد الأقصى 5 صور)</label>
            <!-- 5 Individual File Inputs -->
            <div id="image-inputs-container">
                <label style="font-size:0.8rem; margin-top:5px; display:block">الصورة 1</label>
                <input type="file" id="p-file-1" class="file-input" accept="image/*">
                <label style="font-size:0.8rem; margin-top:5px; display:block">الصورة 2</label>
                <input type="file" id="p-file-2" class="file-input" accept="image/*">
                <label style="font-size:0.8rem; margin-top:5px; display:block">الصورة 3</label>
                <input type="file" id="p-file-3" class="file-input" accept="image/*">
                <label style="font-size:0.8rem; margin-top:5px; display:block">الصورة 4</label>
                <input type="file" id="p-file-4" class="file-input" accept="image/*">
                <label style="font-size:0.8rem; margin-top:5px; display:block">الصورة 5</label>
                <input type="file" id="p-file-5" class="file-input" accept="image/*">
            </div>
            <small style="color:#777; display:block; margin-bottom:10px">اترك الصور فارغة عند التعديل للاحتفاظ بالصور القديمة</small>
            
            <button type="submit" class="btn btn-primary w-100" style="margin-top:15px" id="pub-btn" data-tr="publish">نشر</button>
        </form>
    </div>
</div>

<!-- Filter -->
<div class="modal-wrap" id="filter-modal">
    <div class="modal-content">
        <span clas
